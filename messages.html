<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFL Social Ultra - הודעות פרטיות</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="messages-section">
  <h2>הודעות פרטיות</h2>
  <div class="chat-users">
    <input type="text" id="chat-search" placeholder="חפש משתמשים...">
    <div id="chat-users-list"></div>
  </div>
  <div class="chat-window">
    <div id="chat-feed"></div>
    <input type="text" id="chat-input" placeholder="כתוב הודעה...">
    <button id="send-msg-btn">שלח</button>
  </div>
</div>
<script type="module" src="messages.js"></script>
</body>
</html>
