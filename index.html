<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFL Social Ultra - כניסה</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-section">
  <h2>כניסה / הרשמה</h2>
  <input type="email" id="email" placeholder="דואר אלקטרוני">
  <input type="password" id="password" placeholder="סיסמה">
  <input type="text" id="username" placeholder="שם משתמש">
  <button id="signup-btn">הרשמה</button>
  <button id="login-btn">כניסה</button>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
